<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Onboarding digital de Kivo" />

    <title>Kivo Onboarding</title>

    <link rel="stylesheet" href="/input.css" />
  </head>

  <body class="min-h-screen bg-black font-sans text-white">
    <main class="flex min-h-screen items-center justify-center px-6 py-12">
      <section data-animate class="w-full max-w-md">
        <header class="mb-8 text-center">
          <div
            class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-2xl bg-primary text-black"
          >
            <i data-lucide="sparkles" class="h-8 w-8"></i>
          </div>

          <h1 class="text-3xl font-bold tracking-tight">Crea tu cuenta</h1>

          <p class="mt-3 text-sm leading-6 text-white/60">
            Regístrate para comenzar tu solicitud de préstamo.
          </p>
        </header>

        <form data-onboarding-form class="space-y-5" novalidate>
          <div>
            <label for="email" class="mb-2 block text-sm font-medium">
              Correo electrónico
            </label>

            <div class="relative">
              <i
                data-lucide="mail"
                class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-white/40"
              ></i>

              <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="nombre@correo.com"
                class="kivo-input pl-12"
                required
              />
            </div>
          </div>

          <div>
            <label for="password" class="mb-2 block text-sm font-medium">
              Contraseña
            </label>

            <div class="relative">
              <i
                data-lucide="lock"
                class="pointer-events-none absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-white/40"
              ></i>

              <input
                id="password"
                name="password"
                type="password"
                autocomplete="new-password"
                placeholder="Mínimo 8 caracteres"
                class="kivo-input px-12"
                required
              />

              <button
                type="button"
                data-password-toggle="password"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-white/50 transition hover:text-white"
                aria-label="Mostrar u ocultar contraseña"
              >
                <i data-lucide="eye" class="h-5 w-5"></i>
              </button>
            </div>
          </div>

          <div
            data-error-message
            class="hidden rounded-xl border border-error/30 bg-error/10 p-4 text-sm text-error"
            role="alert"
          >
            <div class="flex items-start gap-3">
              <i data-lucide="circle-x" class="mt-0.5 h-5 w-5 shrink-0"></i>

              <p data-message-text>Ingresa un correo electrónico válido.</p>
            </div>
          </div>

          <div
            data-success-message
            class="hidden rounded-xl border border-success/30 bg-success/10 p-4 text-sm text-success"
            role="status"
          >
            <div class="flex items-start gap-3">
              <i data-lucide="circle-check-big" class="mt-0.5 h-5 w-5 shrink-0"></i>

              <p>Datos validados correctamente.</p>
            </div>
          </div>

          <button type="submit" data-button-animation class="kivo-button">
            Crear cuenta

            <i data-lucide="arrow-right" class="h-5 w-5"></i>
          </button>
        </form>

        <div
          data-animate
          class="mt-6 rounded-xl border border-warning/25 bg-warning/10 p-4"
        >
          <div class="flex items-start gap-3">
            <i
              data-lucide="triangle-alert"
              class="mt-0.5 h-5 w-5 shrink-0 text-warning"
            ></i>

            <p class="text-sm leading-6 text-white/70">
              Nunca compartas tu contraseña ni el código de verificación que recibirás por
              correo.
            </p>
          </div>
        </div>

        <p data-animate class="mt-8 text-center text-sm text-white/50">
          ¿Ya tienes una cuenta?

          <a
            href="#"
            class="font-semibold text-secondary transition hover:brightness-110"
          >
            Inicia sesión
          </a>
        </p>
      </section>
    </main>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
